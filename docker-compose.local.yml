services:
  postgres:
    image: postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  node:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    working_dir: /app/frontend
    volumes:
      - .:/app
      - node_modules:/app/frontend/node_modules
      - bundles:/app/bundles
    command: sh -c "./node_modules/.bin/parcel watch bundles-src/index.js --dist-dir ../bundles --public-url='./'"
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/frontend/bundles/index.js && test -f /app/frontend/bundles/index.css"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - app_network

  django:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DEBUG: "True"
    depends_on:
      postgres:
        condition: service_healthy
      node:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - bundles:/app/bundles
      - media:/app/media
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    networks:
      - app_network

volumes:
  postgres_data:
  bundles:
  node_modules:
  media:

networks:
  app_network:
