services:
  postgres:
    image: postgres:16
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}", "-d", "${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - app_network

  node:
    build:
      context: .
      dockerfile: Dockerfile.node
    working_dir: /app
    volumes:
      - bundles:/app/bundles
    command: sh -c "./node_modules/.bin/parcel build bundles-src/index.js --dist-dir bundles --public-url='./'"
    networks:
      - app_network

  django:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
      node:
        condition: service_completed_successfully
    volumes:
      - bundles:/app/bundles
      - staticfiles:/app/staticfiles
      - media:/app/media
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn -w 3 -b 0.0.0.0:8000 star_burger.wsgi:application"
    restart: unless-stopped
    networks:
      - app_network

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - django
    volumes:
      - staticfiles:/static
      - media:/media
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    restart: unless-stopped
    networks:
      - app_network

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot

volumes:
  postgres_data:
  bundles:
  staticfiles:
  media:
  certbot_certs:
  certbot_www:

networks:
  app_network:
